<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 添加视口标签，适配移动端 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>王少东的个人主页 | 王少东</title>
  <style>
    body {
      font-family: 微软雅黑, Arial, sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
      color: #333;
      display: flex; /* 弹性布局，让文字和二维码并排 */
      flex-wrap: wrap; /* 手机端自动换行 */
      gap: 40px; /* 文字和二维码之间的间距 */
      align-items: flex-start; /* 改为顶部对齐，视觉更协调 */
    }
    .main-info {
      flex: 1; /* 文字区域自适应宽度 */
      min-width: 300px; /* 手机端最小宽度，避免挤变形 */
    }
    .qrcode {
      flex: 0 0 200px; /* 二维码固定宽度200px */
      text-align: center;
    }
    .qrcode img {
      width: 200px;
      height: 200px;
      border: 1px solid #eee;
      padding: 8px;
      border-radius: 8px;
      /* 添加加载失败时的备用样式 */
      object-fit: cover;
    }
    .qrcode p {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }
    h1 {
      color: #000;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      margin-top: 0;
    }
    .info {
      margin: 20px 0;
      line-height: 1.8;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    /* 适配手机端 */
    @media (max-width: 600px) {
      body {
        flex-direction: column;
        margin: 30px auto;
        gap: 20px;
      }
      .qrcode {
        flex: none;
        width: 100%;
      }
      .qrcode img {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="main-info">
    <h1>王少东 的个人主页</h1>
    <div class="info">
      <p>👋 你好，我是 王少东，这是我的极简个人主页。</p>
      <p>📱 微信：Sheldon_Ong</p>
      <p>📧 邮箱：SheldonOng@qq.com</p>
      <p>💻  个人网站：<a href="https://www.wangshaodong.com">www.wangshaodong.com</a></p>
      <p>📝 一句话介绍：专注电商&互联网领域，保持学习～</p>
    </div>
  </div>

  <!-- 王少东的微信二维码区域 -->
  <div class="qrcode">
    <img src="https://img.imgos.cn/cdn/20260322/1ba7dc767bd086fe6b8e0cdd6c559a0d.jpg" alt="王少东的微信二维码">
    <p>📱 扫码添加王少东的微信</p>
  </div>
</body>
</html>
